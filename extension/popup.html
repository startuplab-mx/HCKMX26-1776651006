<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Nahual Shield</title>
    <style>
      body { width: 300px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #2F353A; color: #fff; }
      h1 { font-size: 16px; margin: 0; padding: 14px 16px; background: #C16A4C; }
      .body { padding: 14px 16px; font-size: 13px; line-height: 1.4; }
      .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
      .stat:last-child { border: 0; }
      .legend { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 8px; }
      .footer { font-size: 11px; color: #C16A4C; padding: 10px 16px; background: #1f2326; text-align: center; }
      .footer strong { color: #fff; }
    </style>
  </head>
  <body>
    <h1>🛡️ Nahual Shield</h1>
    <div class="body">
      <div class="stat"><span>Estado</span><strong id="status">Activo</strong></div>
      <div class="stat"><span>Detecciones esta sesión</span><strong id="hits">0</strong></div>
      <div class="stat"><span>Plataformas</span><strong>WA · IG · Discord</strong></div>
      <p class="legend">
        Detección local (zero-trust). Si aparece una alerta sospechosa,
        repórtala al bot Nahual de WhatsApp para análisis completo.
      </p>
    </div>
    <div class="footer">Policía Cibernética: <strong>088</strong> · SIPINNA</div>
    <script src="popup.js"></script>
  </body>
</html>
